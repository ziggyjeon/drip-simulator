<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIP 배당 시뮬레이터</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a8f6e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DRIP">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f6f8;
    font-family: -apple-system, 'Pretendard', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .splash {
    text-align: center;
    padding: 40px 24px;
  }
  .icon {
    width: 80px; height: 80px;
    border-radius: 20px;
    margin: 0 auto 20px;
    display: block;
  }
  h1 {
    font-size: 22px; font-weight: 700;
    color: #1a1d24; letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  h1 span { color: #0a8f6e; }
  p {
    font-size: 13px; color: #9096a8;
    line-height: 1.6; margin-bottom: 28px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e0e3e8;
    border-top-color: #0a8f6e;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .redirect-msg {
    font-size: 12px; color: #9096a8;
  }
  /* 수동 선택 버튼 (JS 비활성화 환경 fallback) */
  .manual-links {
    display: none;
    gap: 10px; flex-direction: column; align-items: center;
    margin-top: 16px;
  }
  .btn {
    display: inline-block; padding: 11px 28px;
    border-radius: 9px; font-size: 14px; font-weight: 500;
    text-decoration: none; cursor: pointer;
    transition: opacity .15s;
  }
  .btn:active { opacity: .75; }
  .btn-primary { background: #0a8f6e; color: #fff; }
  .btn-secondary { background: #fff; color: #0a8f6e; border: 1px solid #0a8f6e; }
</style>
</head>
<body>

<div class="splash">
  <img src="icon-192.png" alt="DRIP 아이콘" class="icon">
  <h1><span>DRIP</span> 배당 시뮬레이터</h1>
  <p>세후 실수령 기준 · 누진세율 자동 계산<br>건보료 포함 · 생활비 전환 시나리오</p>
  <div class="spinner" id="spinner"></div>
  <div class="redirect-msg" id="msg">기기 유형 감지 중…</div>
  <!-- JS 실패 시 수동 선택 -->
  <div class="manual-links" id="manual">
    <a href="mobile.html" class="btn btn-primary">📱 모바일 버전</a>
    <a href="desktop.html" class="btn btn-secondary">🖥 데스크탑 버전</a>
  </div>
</div>

<script>
// Service Worker 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// 기기 감지 후 리다이렉트
(function () {
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)
    || window.innerWidth < 768;

  const target = isMobile ? 'mobile.html' : 'desktop.html';
  const label  = isMobile ? '모바일' : '데스크탑';

  document.getElementById('msg').textContent = label + ' 버전으로 이동 중…';

  // 300ms 후 이동 (스플래시가 잠깐 보이게)
  setTimeout(() => {
    window.location.replace(target);
  }, 300);
})();

// 2초 후에도 리다이렉트 안 됐으면 수동 버튼 표시
setTimeout(() => {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('msg').textContent = '자동 이동에 실패했습니다. 직접 선택해주세요.';
  document.getElementById('manual').style.display = 'flex';
}, 2000);
</script>
</body>
</html>
